<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.15.2/moment.min.js"></script>
  <script src="https://kit.fontawesome.com/4635025c29.js" crossorigin="anonymous"></script>
  <link rel="icon" type="image/jpg" href="img/header.jpg"/>
  <title>TOTO CUMPLE 3 AÑO</title>
  <!-- FACEBOOK Open Graph === -->
  <meta property="og:type" content="website" />
  <!-- <meta property="og:type" content="article" />  PARA ARTÍCULOS  -->
  <meta property="og:title" content="TOTO CUMPLE 3 AÑO" />
  <meta property="og:description" content="CUMPLE DEL TOTO" />
  <meta property="og:image" content="https://romanpristupa.github.io/TotoCumple3/img/vistaprevia.jpg"/>
  <meta property="og:image:width" content="800" /><!-- Importante -->
  <meta property="og:image:height" content="418" /><!-- Importante -->
  <meta property="og:site_name" content="TOTO CUMPLE 3 AÑO" /> 
  <meta property="fb:app_id" content="330307617951079"/> 
</head>
<body>
  <header>
    <img src="img/header.jpg" alt="Foto Dino">
    <audio id="background-audio" autoplay loop>
      <source src="grabacion.mp3" type="audio/mp3">
      Your browser does not support the audio element.
    </audio>
  </header>
  <div id="resultado"></div>
  <div id="minuto"></div>
  <section>
    <div class="lacirilalogo">
      <h2 class="enSalon">Salón Tata Multieventos</h2>
      <img src="img/tata.jpg" alt="Tata Eventos">
    </div>
    <a href="https://maps.app.goo.gl/Kgv1fYfgvtdCCzSVA" class="direccion">
      <h2 class="direccion">Avenida Camino General Belgrano  N°4398 </h2>
    </a>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3276.1060459390237!2d-58.22056949999999!3d-34.8032738!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95a328f11fc9a32d%3A0x8c6e89d2b7d4c76b!2sCno.%20Gral.%20Belgrano%204398%2C%20B1837CHY%20Sourigues%2C%20Provincia%20de%20Buenos%20Aires!5e0!3m2!1ses-419!2sar!4v1783711582002!5m2!1ses-419!2sar" width="400" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </section>
  <section>
    <article>
      <a href="https://api.whatsapp.com/send?phone=5491159904862&text=Confirmo%C2%A0mi%C2%A0presencia" id="confirmLink">
        <button class="botonConfirmar botonAgendame" id="confirmBtn"><i class="fa-solid fa-square-check"></i> Confirmar Presencia</button>
      </a>
    </article>
  </section>
  <footer>
    <img src="img/final.jpg" alt="Pow Patrol" class="footer-img">
  </footer>
  <script type="text/javascript">
    var final = moment("2026-07-25T18:00:00");
    setInterval(function() {
      var inicio = moment();
      var duracion = final.diff(inicio);
      var intervalo = moment.duration(duracion);
      var dias = Math.floor(intervalo.asDays());
      var horas = intervalo.hours();
      var minutos = intervalo.minutes();
      var segundos = intervalo.seconds();
      $("#resultado").html("Faltan " + dias + " Días");
      $("#minuto").html(horas + ":" + minutos + ":" + segundos );
    }, 1000);

    // Función para desmutear y reproducir el audio al hacer clic en cualquier parte del body
    document.addEventListener('DOMContentLoaded', function() {
      var audio = document.getElementById('background-audio');
      audio.muted = false;
      audio.play().catch(function(error) {
        // el navegador bloqueó el autoplay con sonido: arranca apenas
        // haya el primer toque en la pantalla
        console.log('Autoplay con sonido bloqueado, esperando primer toque:', error);
      });

      document.body.addEventListener('click', function() {
        audio.muted = false;
        if (audio.paused) audio.play();
      }, { once: true });

      // ---- Animación del perrito corriendo al confirmar ----
      var confirmLink = document.getElementById('confirmLink');
      var confirmBtn = document.getElementById('confirmBtn');

      confirmLink.addEventListener('click', function (e) {
        if (confirmBtn.classList.contains('is-running')) {
          return; // ya jugó la animación, dejamos pasar el click
        }
        e.preventDefault();
        confirmBtn.classList.add('is-running');

        var runway = document.createElement('div');
        runway.className = 'runway';
        runway.innerHTML =
          '<div class="ground"></div>' +
          '<div class="bubble">¡Voy para allá!</div>' +
          '<svg class="pup" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">' +
            '<g class="legs">' +
              '<rect x="60" y="88" width="10" height="24" rx="5" fill="#B2701A"/>' +
              '<rect x="120" y="88" width="10" height="24" rx="5" fill="#8C5714"/>' +
            '</g>' +
            '<ellipse cx="100" cy="80" rx="55" ry="26" fill="#F2A93B"/>' +
            '<circle cx="150" cy="62" r="22" fill="#F2A93B"/>' +
            '<ellipse cx="163" cy="50" rx="8" ry="12" fill="#B2701A" transform="rotate(20 163 50)"/>' +
            '<circle cx="158" cy="60" r="2.6" fill="#17264A"/>' +
            '<ellipse cx="168" cy="70" rx="6" ry="4" fill="#17264A"/>' +
            '<ellipse cx="55" cy="86" rx="16" ry="10" fill="#F2A93B"/>' +
            '<path d="M35 86 q-15 -4 -22 6" stroke="#F2A93B" stroke-width="10" fill="none" stroke-linecap="round"/>' +
            '<circle cx="150" cy="46" r="6" fill="#E2231A"/>' +
          '</svg>';
        document.body.appendChild(runway);
        requestAnimationFrame(function () { runway.classList.add('active'); });

        var pawCount = 6;
        for (var i = 0; i < pawCount; i++) {
          (function (i) {
            setTimeout(function () {
              var paw = document.createElement('div');
              paw.className = 'paw';
              paw.textContent = '🐾';
              paw.style.left = (8 + i * 14) + '%';
              runway.appendChild(paw);
            }, 120 * i);
          })(i);
        }

        setTimeout(function () {
          window.location.href = confirmLink.href;
          confirmBtn.classList.remove('is-running');
          runway.classList.remove('active');
          setTimeout(function () { runway.remove(); }, 300);
        }, 1300);
      });
    });
  </script>
</body>
</html>
